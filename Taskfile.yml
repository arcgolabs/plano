version: "3"

vars:
  FILE: '{{default "./build.plano" .FILE}}'
  EXAMPLE: '{{default "builddsl" .EXAMPLE}}'
  FORMAT: '{{default "json" .FORMAT}}'
  OUT: '{{default "-" .OUT}}'
  BUILDDSL_SAMPLE: ./examples/builddsl/sample.plano
  PIPELINEDSL_SAMPLE: ./examples/pipelinedsl/sample.plano
  SERVICEDSL_SAMPLE: ./examples/servicedsl/sample.plano

tasks:
  test:
    desc: Run the workspace Go test suite
    cmds:
      - go test ./... ./cmd/plano/... ./examples/builddsl/... ./examples/pipelinedsl/... ./examples/servicedsl/... ./lsp/...

  lint:
    desc: Run golangci-lint across all workspace modules
    cmds:
      - /Users/daiyuang/.go/bin/golangci-lint run ./... ./cmd/plano/... ./examples/builddsl/... ./examples/pipelinedsl/... ./examples/servicedsl/... ./lsp/...

  fmt:
    desc: Format all Go sources in the workspace
    cmds:
      - gofmt -w ast/*.go cmd/plano/*.go compiler/*.go diag/*.go examples/builddsl/*.go examples/pipelinedsl/*.go examples/servicedsl/*.go frontend/plano/*.go internal/lexer/*.go internal/parser/*.go lsp/*.go schema/*.go

  work:sync:
    desc: Sync the Go workspace after module layout changes
    cmds:
      - go work sync

  examples:
    desc: List bundled example DSLs
    cmds:
      - go run ./cmd/plano examples --format {{default "text" .FORMAT}}

  parse:
    desc: Parse a plano file and print the AST
    cmds:
      - go run ./cmd/plano parse --format {{.FORMAT}} {{.FILE}}

  bind:
    desc: Bind declarations in a plano file
    cmds:
      - go run ./cmd/plano bind --example {{.EXAMPLE}} --format {{.FORMAT}} {{if ne .OUT "-"}}--out {{.OUT}} {{end}}{{.FILE}}

  check:
    desc: Typecheck a plano file
    cmds:
      - go run ./cmd/plano check --example {{.EXAMPLE}} --format {{.FORMAT}} {{if ne .OUT "-"}}--out {{.OUT}} {{end}}{{.FILE}}

  hir:
    desc: Compile a plano file and print typed HIR
    cmds:
      - go run ./cmd/plano hir --example {{.EXAMPLE}} --format {{.FORMAT}} {{if ne .OUT "-"}}--out {{.OUT}} {{end}}{{.FILE}}

  compile:
    desc: Compile a plano file and print the typed document
    cmds:
      - go run ./cmd/plano compile --example {{.EXAMPLE}} --format {{.FORMAT}} {{if ne .OUT "-"}}--out {{.OUT}} {{end}}{{.FILE}}

  lower:
    desc: Lower a plano file with the example DSL
    cmds:
      - go run ./cmd/plano lower --example {{.EXAMPLE}} --format {{.FORMAT}} {{if ne .OUT "-"}}--out {{.OUT}} {{end}}{{.FILE}}

  validate:
    desc: Validate a plano file
    cmds:
      - go run ./cmd/plano validate --example {{.EXAMPLE}} {{.FILE}}

  diag:
    desc: Print diagnostics for a plano file
    cmds:
      - go run ./cmd/plano diag --example {{.EXAMPLE}} --format {{default "text" .FORMAT}} {{.FILE}}

  example:builddsl:
    desc: Lower the bundled builddsl sample
    cmds:
      - go run ./cmd/plano lower --example builddsl --format {{.FORMAT}} {{.BUILDDSL_SAMPLE}}

  example:pipelinedsl:
    desc: Lower the bundled pipelinedsl sample
    cmds:
      - go run ./cmd/plano lower --example pipelinedsl --format {{.FORMAT}} {{.PIPELINEDSL_SAMPLE}}

  example:servicedsl:
    desc: Lower the bundled servicedsl sample
    cmds:
      - go run ./cmd/plano lower --example servicedsl --format {{.FORMAT}} {{.SERVICEDSL_SAMPLE}}
