version: "3"

vars:
  FILE: '{{default "./cmd/plano/samples/basic.plano" .FILE}}'
  FORMAT: '{{default "json" .FORMAT}}'
  OUT: '{{default "-" .OUT}}'
  SAMPLE: '{{default "basic" .SAMPLE}}'

tasks:
  test:
    desc: Run the workspace Go test suite
    cmds:
      - go test ./... ./cmd/plano/... ./examples/builddsl/... ./examples/pipelinedsl/... ./examples/servicedsl/... ./lsp/...

  lint:
    desc: Run golangci-lint across all workspace modules
    cmds:
      - golangci-lint run ./... ./cmd/plano/... ./examples/builddsl/... ./examples/pipelinedsl/... ./examples/servicedsl/... ./lsp/...

  bench:
    desc: Run compiler and LSP benchmarks
    cmds:
      - task: bench:compiler
      - task: bench:lsp

  bench:compiler:
    desc: Run compiler benchmarks
    cmds:
      - go test -run=^$ -bench=. ./compiler

  bench:lsp:
    desc: Run LSP benchmarks
    cmds:
      - go test -run=^$ -bench=. ./lsp/...

  fmt:
    desc: Format all Go sources in the workspace
    cmds:
      - gofmt -w ast/*.go cmd/plano/*.go compiler/*.go diag/*.go examples/builddsl/*.go examples/pipelinedsl/*.go examples/servicedsl/*.go frontend/plano/*.go internal/lexer/*.go internal/parser/*.go lsp/*.go schema/*.go

  work:sync:
    desc: Sync the Go workspace after module layout changes
    cmds:
      - go work sync

  examples:
    desc: List bundled example DSLs
    cmds:
      - go run ./cmd/plano examples --format {{default "text" .FORMAT}}

  parse:
    desc: Parse a plano file and print the AST
    cmds:
      - go run ./cmd/plano parse --format {{.FORMAT}} {{.FILE}}

  bind:
    desc: Bind declarations in a plano file
    cmds:
      - go run ./cmd/plano bind --format {{.FORMAT}} {{if ne .OUT "-"}}--out {{.OUT}} {{end}}{{.FILE}}

  check:
    desc: Typecheck a plano file
    cmds:
      - go run ./cmd/plano check --format {{.FORMAT}} {{if ne .OUT "-"}}--out {{.OUT}} {{end}}{{.FILE}}

  hir:
    desc: Compile a plano file and print typed HIR
    cmds:
      - go run ./cmd/plano hir --format {{.FORMAT}} {{if ne .OUT "-"}}--out {{.OUT}} {{end}}{{.FILE}}

  compile:
    desc: Compile a plano file and print the typed document
    cmds:
      - go run ./cmd/plano compile --format {{.FORMAT}} {{if ne .OUT "-"}}--out {{.OUT}} {{end}}{{.FILE}}

  validate:
    desc: Validate a plano file
    cmds:
      - go run ./cmd/plano validate {{.FILE}}

  diag:
    desc: Print diagnostics for a plano file
    cmds:
      - go run ./cmd/plano diag --format {{default "text" .FORMAT}} {{.FILE}}

  sample:
    desc: Print an embedded plano sample
    cmds:
      - go run ./cmd/plano examples {{.SAMPLE}}

  sample:build:
    desc: Print the embedded build sample
    cmds:
      - go run ./cmd/plano examples build

  sample:pipeline:
    desc: Print the embedded pipeline sample
    cmds:
      - go run ./cmd/plano examples pipeline

  sample:service:
    desc: Print the embedded service sample
    cmds:
      - go run ./cmd/plano examples service
