# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: plano

before:
  hooks:
    - go work sync

builds:
  - id: plano
    main: ./cmd/plano
    binary: plano
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: plano
    ids:
      - plano
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

release:
  github:
    owner: arcgolabs
    name: plano
  prerelease: auto
  name_template: "plano {{ .Tag }}"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
